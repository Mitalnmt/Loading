<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exam Tool</title>
<style>
body { font-family: Arial; padding: 20px; }
textarea { width: 100%; height: 150px; margin-bottom: 10px; }
button { padding: 8px 12px; margin-right: 10px; }
</style>
</head>
<body>

<h3>Questions</h3>
<textarea id="questions"></textarea>

<h3>Answers</h3>
<textarea id="answers"></textarea>
<button onclick="sendAnswers()">Send</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOE5nADwtvu6x9y-Ue6gqwMj0wb9-olWo",
  authDomain: "exam-csr-eos.firebaseapp.com",
  databaseURL: "https://exam-csr-eos-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "exam-csr-eos",
  storageBucket: "exam-csr-eos.firebasestorage.app",
  messagingSenderId: "167174925406",
  appId: "1:167174925406:web:7e78604f7540dc757798cf"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== QUESTIONS =====
const qRef = ref(db, "questions");
onValue(qRef, (snap) => {
  const data = snap.val();
  if (!data) return;

  const latest = Object.values(data).pop();
  document.getElementById("questions").value = latest.content;

  console.log("New question loaded");
});

// ===== ANSWERS =====
const aRef = ref(db, "answers");
onValue(aRef, (snap) => {
  const data = snap.val();
  if (!data) return;

  const latest = Object.values(data).pop();
  document.getElementById("answers").value = latest.content;
});

// ===== FIX: bind button đúng cách =====
document.querySelector("button").addEventListener("click", sendAnswers);

// ===== SEND =====
function sendAnswers() {
  const text = document.getElementById("answers").value;

  if (!text.trim()) {
    console.log("Empty answer → skip");
    return;
  }

  push(ref(db, "answers"), {
    timestamp: new Date().toISOString(),
    content: text
  })
  .then(() => {
    console.log("Sent OK");
  })
  .catch((err) => {
    console.error("Send error:", err);
  });
}
</script>

</body>
</html>
